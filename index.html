<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tower Defense - Un juego clásico de defensa. Coloca torres y defiende tu base. Compatible con GitHub Pages.">
    <meta name="theme-color" content="#00ff00">
    <title>Tower Defense - Juego de Defensa</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="gameContainer" class="game-container">
        <!-- Interfaz del juego -->
        <div id="gameUI" class="game-ui">
            <div class="ui-section">
                <div class="ui-stat">
                    <span class="label">NIVEL:</span>
                    <span id="levelDisplay" class="value">1</span>
                </div>
                <div class="ui-stat">
                    <span class="label">VIDAS:</span>
                    <span id="lifeDisplay" class="value">20</span>
                </div>
                <div class="ui-stat">
                    <span class="label">ORO:</span>
                    <span id="goldDisplay" class="value">200</span>
                </div>
                <div class="ui-stat">
                    <span class="label">OLAS:</span>
                    <span id="waveDisplay" class="value">0/5</span>
                </div>
                <div class="ui-stat">
                    <span class="label">SCORE:</span>
                    <span id="scoreDisplay" class="value">0</span>
                </div>
            </div>

            <!-- Panel de torres -->
            <div class="towers-panel">
                <h3>TORRES</h3>
                <button id="towerBasicBtn" class="tower-btn" data-tower="basic">
                    [1] Básica (50 O)<br>
                    <small>Daño: 1 | Vel: Normal</small>
                </button>
                <button id="towerFastBtn" class="tower-btn" data-tower="fast">
                    [2] Rápida (75 O)<br>
                    <small>Daño: 1 | Vel: Rápida</small>
                </button>
                <button id="towerPowerBtn" class="tower-btn" data-tower="power">
                    [3] Potente (150 O)<br>
                    <small>Daño: 3 | Vel: Lenta</small>
                </button>
                <button id="towerIceBtn" class="tower-btn" data-tower="ice">
                    [4] Hielo (100 O)<br>
                    <small>Ralentiza | Daño: 0.5</small>
                </button>
                <button id="barracksBtn" class="tower-btn" data-tower="barracks">
                    [5] Barracón (300 O)<br>
                    <small>Genera 👹</small>
                </button>
            </div>

            <!-- Botones de control -->
            <div class="control-panel">
                <button id="startBtn" class="btn btn-primary">Iniciar Juego</button>
                <button id="pauseBtn" class="btn btn-secondary" disabled>Pausar</button>
                <button id="resetBtn" class="btn btn-danger">Reiniciar</button>
            </div>

            <!-- Información adicional -->
            <div class="info-panel">
                <p id="message" class="message"></p>
            </div>

            <!-- Panel de upgrade de torres (oculto por defecto) -->
            <div id="upgradePanel" class="upgrade-panel" style="display: none;">
                <h3>MEJORAR TORRE</h3>
                <div id="upgradeInfo" class="upgrade-info">
                    <p>Torre: <span id="upgradeTowerType">-</span></p>
                    <p>Nivel: <span id="upgradeTowerLevel">0</span></p>
                </div>
                <div id="upgradeButtons" class="upgrade-buttons">
                    <!-- Se genera dinámicamente -->
                </div>
                <button id="closeUpgradeBtn" class="btn btn-secondary">Cerrar</button>
            </div>

            <!-- Botón de logros -->
            <div class="achievements-button-container">
                <button id="achievementsBtn" class="btn btn-achievements">🏆 Logros</button>
            </div>
        </div>

        <!-- Modal de logros (oculto por defecto) -->
        <div id="achievementsModal" class="achievements-modal" style="display: none;">
            <div class="achievements-content">
                <div class="achievements-header">
                    <h1>🏆 LOGROS Y OBJETIVOS</h1>
                    <button id="closeAchievementsBtn" class="btn btn-close">✕</button>
                </div>
                
                <div class="achievements-scroll">
                    <div id="achievementsContainer" class="achievements-grid">
                        <!-- Se genera dinámicamente -->
                    </div>
                </div>

                <div class="achievements-footer">
                    <p id="achievementsStats" class="achievements-stats">
                        <!-- Se actualiza dinámicamente -->
                    </p>
                </div>
            </div>
        </div>

        <!-- Área de renderizado del juego -->
        <div id="gameArea" class="game-area">
            <canvas id="gameCanvas" class="game-canvas"></canvas>
        </div>
    </div>

    <!-- Overlay de inicio con enemigos animados -->
    <div id="startOverlay" class="start-overlay">
        <div class="start-overlay-background">
            <!-- Enemigos animados de fondo -->
            <div class="animated-enemies-container">
                <div class="enemy-animated enemy-animated-1">👾</div>
                <div class="enemy-animated enemy-animated-2">💨</div>
                <div class="enemy-animated enemy-animated-3">🦾</div>
                <div class="enemy-animated enemy-animated-4">👹</div>
                <div class="enemy-animated enemy-animated-5">👾</div>
                <div class="enemy-animated enemy-animated-6">💨</div>
                <div class="enemy-animated enemy-animated-7">🦾</div>
                <div class="enemy-animated enemy-animated-8">👹</div>
                <div class="enemy-animated enemy-animated-9">👾</div>
                <div class="enemy-animated enemy-animated-10">💨</div>
                <div class="enemy-animated enemy-animated-11">🦾</div>
                <div class="enemy-animated enemy-animated-12">💨</div>
            </div>
            
            <!-- Contenido del overlay -->
            <div class="start-overlay-content">
                <h1 class="start-title">🏰 TOWER DEFENSE 🏰</h1>
                <p class="start-subtitle">Defiende tu base de la invasión enemiga</p>
                <button id="startGameBtn" class="btn btn-start-game">INICIAR JUEGO</button>
                <p class="start-info">Presiona cualquier tecla o haz clic para comenzar</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/audio.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/towers.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
